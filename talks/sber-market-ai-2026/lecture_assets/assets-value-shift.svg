<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Сдвиг ценности: канал вверх, технология вниз">
  <defs>
    <linearGradient id="assets-grad-up" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="assets-grad-down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="assets-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="420" fill="#f8fafc"/>
  <g filter="url(#assets-shadow)">
    <rect x="520" y="40" width="380" height="340" rx="16" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="710" y="88" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#0369a1">Канал · дистрибуция · доступ</text>
    <text x="710" y="118" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="15" fill="#475569">Закреплённые продажи, сегмент, данные</text>
    <path d="M 710 280 L 710 140" stroke="url(#assets-grad-up)" stroke-width="14" stroke-linecap="round"/>
    <polygon points="710,125 695,155 725,155" fill="#0369a1"/>
    <text x="710" y="330" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#0369a1">↑ ценность для стратегии</text>
  </g>
  <g filter="url(#assets-shadow)">
    <rect x="60" y="40" width="380" height="340" rx="16" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <text x="250" y="88" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#475569">Продукт · «чистая» технология</text>
    <text x="250" y="118" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="15" fill="#64748b">Копируется быстрее при доступе к LLM / open weights</text>
    <path d="M 250 140 L 250 280" stroke="url(#assets-grad-down)" stroke-width="14" stroke-linecap="round"/>
    <polygon points="250,295 235,265 265,265" fill="#64748b"/>
    <text x="250" y="330" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#64748b">↓ барьер копирования</text>
  </g>
  <text x="480" y="400" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" fill="#64748b">В промпте явно просите канал, данные и долю рынка — не только описание фичи</text>
</svg>
